<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; background:transparent; overflow:hidden; }
.page {
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}
.globe-wrapper { position: relative; }
#globe-3d { display: block; }
</style>
</head>
<body>
<div class="page">
  <div class="globe-wrapper">
    <canvas id="globe-3d"></canvas>
  </div>
</div>

<script type="module">
import * as THREE    from "https://cdn.skypack.dev/three@0.133.1/build/three.module";
import { OrbitControls } from "https://cdn.skypack.dev/three@0.133.1/examples/jsm/controls/OrbitControls";
import * as topojson from "https://cdn.skypack.dev/topojson-client@3";

const containerEl = document.querySelector(".globe-wrapper");
const canvas3D    = containerEl.querySelector("#globe-3d");

let renderer, scene, camera, controls;

// Convert lat/lon → 3D point on unit sphere
function latLonToVec3(lat, lon, r = 1.002) {
  const phi   = (90 - lat)  * (Math.PI / 180);
  const theta = (lon + 180) * (Math.PI / 180);
  return new THREE.Vector3(
    -r * Math.sin(phi) * Math.cos(theta),
     r * Math.cos(phi),
     r * Math.sin(phi) * Math.sin(theta)
  );
}

function initScene() {
  renderer = new THREE.WebGLRenderer({ canvas: canvas3D, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  scene  = new THREE.Scene();
  camera = new THREE.OrthographicCamera(-1.1, 1.1, 1.1, -1.1, 0, 3);
  camera.position.z = 1.1;

  controls = new OrbitControls(camera, canvas3D);
  controls.enablePan  = false;
  controls.enableZoom = false;
  controls.enableDamping    = true;
  controls.dampingFactor    = 0.08;
  controls.autoRotate       = true;
  controls.autoRotateSpeed  = 0.4;
  controls.minPolarAngle    = 0.3 * Math.PI;
  controls.maxPolarAngle    = 0.7 * Math.PI;

  // Dark sphere base
  const sphereMat = new THREE.MeshBasicMaterial({ color: 0x0a1628 });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(1, 64, 64), sphereMat));

  // Outer glow shell
  const glowMat = new THREE.MeshBasicMaterial({
    color: 0x1a3a6e,
    transparent: true,
    opacity: 0.12,
    side: THREE.BackSide,
  });
  scene.add(new THREE.Mesh(new THREE.SphereGeometry(1.08, 64, 64), glowMat));

  updateSize();

  // Load country borders (TopoJSON 50m = good detail)
  fetch("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json")
    .then(r => r.json())
    .then(world => {
      const countries = topojson.feature(world, world.objects.countries);

      const lineMat = new THREE.LineBasicMaterial({
        color:       0x7fb3e8,
        transparent: true,
        opacity:     0.65,
      });

      countries.features.forEach(feature => {
        const { geometry } = feature;
        const polys = geometry.type === "Polygon"
          ? [geometry.coordinates]
          : geometry.coordinates; // MultiPolygon

        polys.forEach(poly => {
          poly.forEach(ring => {
            const pts = ring.map(([lon, lat]) => latLonToVec3(lat, lon));
            const geo = new THREE.BufferGeometry().setFromPoints(pts);
            scene.add(new THREE.Line(geo, lineMat));
          });
        });
      });
    });

  render();
}

function render() {
  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(render);
}

function updateSize() {
  const side = Math.min(window.innerWidth, window.innerHeight);
  containerEl.style.width  = side + "px";
  containerEl.style.height = side + "px";
  renderer.setSize(side, side);
}

initScene();
window.addEventListener("resize", updateSize);
</script>
</body>
</html>
